AllCops:
  TargetRubyVersion: 3.2
  Exclude:
    - certs/**/*
    - checksums/**/*
    - docs/**/*
    - examples/**/*
    - fixtures/**/*
    - gemfiles/*.gemfile
    - pkg/**/*
    - results/**/*
    - spec/fixtures/**/*
    - tmp/**/*
    - vendor/**/*
    - AGENTS.md
Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes
inherit_gem:
  rubocop-lts: config/rubygem_rspec.yml
inherit_from:
  - .rubocop_rspec.yml
plugins: rubocop-on-rbs
inherit_mode:
  merge:
    - Exclude
RBS:
  Enabled: true
Layout/IndentationConsistency:
  Exclude: ['*.md']
  Exclude: ['*.md']
